    <script>
      (function () {
        var fill   = document.getElementById('ld-fill');
        var status = document.getElementById('ld-status');
        var pct    = document.getElementById('ld-pct');
        var loader = document.getElementById('page-loader');
        var dismissed  = false;
        var animDone   = false;
        var reactReady = false;

        var steps = [
          [15,  'LOADING ASSETS'],
          [35,  'COMPILING SCHEDULER'],
          [55,  'INITIALIZING ENGINE'],
          [72,  'MAPPING PROCESSES'],
          [88,  'CALIBRATING AI-SJF'],
          [100, 'SYSTEM READY'],
        ];
        var i = 0;

        function tick() {
          if (i >= steps.length) {
            // Hold at 100% for 400 ms, then try to dismiss
            animDone = true;
            setTimeout(tryDismiss, 400);
            return;
          }
          var s = steps[i++];
          fill.style.width   = s[0] + '%';
          status.textContent = s[1];
          pct.textContent    = s[0] + '%';
          // 500–750 ms per step → ~3–5 s total
          var delay = 500 + Math.random() * 250;
          setTimeout(tick, delay);
        }

        function tryDismiss() {
          if (animDone && reactReady) dismiss();
        }

        function dismiss() {
          if (dismissed) return; dismissed = true;
          loader.classList.add('loader-hidden');
          loader.addEventListener('transitionend', function h() {
            loader.removeEventListener('transitionend', h);
            loader.remove();
          });
        }

        // React calls this after first render; waits for animation to finish too
        window.__dismissLoader = function () {
          reactReady = true;
          tryDismiss();
        };

        // Start animation
        setTimeout(tick, 300);

        // Safety fallback at 8 s
        setTimeout(dismiss, 8000);
      })();
